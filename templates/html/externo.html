<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portal AAC IBMEC" />
  <title>IBMEC — Solicitação Externa</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/externo.css" />
</head>
<body>

  <nav class="navegacao" role="navigation" aria-label="Menu principal">
    <div class="nav-container">
      <a href="/" class="logo-nav" aria-label="IBMEC - Início">
        <div class="caixa-logo">I</div>
        <span>IBMEC</span>
      </a>

      <ul class="menu-principal">
        <li>
          <a href="/dashboard" class="menu-link">Dashboard</a>
        </li>
        <li class="menu-com-submenu">
          <button class="menu-botao" aria-expanded="false" aria-haspopup="true">
            Solicitação <span aria-hidden="true">▼</span>
          </button>
          <ul class="submenu" role="menu">
            <li role="none"><a href="/solicitacao/interna" role="menuitem">Interna</a></li>
            <li role="none"><a href="/solicitacao/externa" role="menuitem" target="_blank">Externa</a></li>
          </ul>
        </li>
        <li>
          <button class="menu-botao menu-perfil-botao" aria-expanded="false" aria-haspopup="true">
            Perfil <span aria-hidden="true">▼</span>
          </button>
          <ul class="submenu-perfil" role="menu">
            <li role="none"><a href="/perfil/editar" role="menuitem">Editar Perfil</a></li>
            <li role="none"><a href="/perfil/config" role="menuitem">Configurações</a></li>
            <li role="none"><hr aria-hidden="true" /></li>
            <li role="none"><a href="/logout" role="menuitem">Sair</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </nav>

  <main class="container-principal">
    <section class="painel-envio" aria-labelledby="tituloExterna">
      <h1 id="tituloExterna" class="titulo-pagina">Solicitação Externa</h1>
      <p class="subtitulo-pagina">Selecione uma categoria, preencha os dados e envie seu documento.</p>

      <div class="campo-select-wrapper">
        <label for="categoria">Categoria</label>
        <select id="categoria" aria-describedby="categoriaHelp">
          <option value="">— Escolha uma categoria —</option>
          <option value="palestra">Palestra</option>
          <option value="workshop">Workshop</option>
          <option value="curso">Curso</option>
        </select>
        <p id="categoriaHelp" class="ajuda">Selecione a categoria antes de preencher o formulário.</p>
      </div>

      <form id="formExterno" class="form-oculto" enctype="multipart/form-data" novalidate>
        <div class="form-rows">
          <div class="campo">
            <label for="curso">Curso / Título</label>
            <input id="curso" name="curso" type="text" placeholder="Nome da palestra ou curso" required />
          </div>

          <div class="campo">
            <label for="data">Data</label>
            <input id="data" name="data" type="date" required />
          </div>

          <div class="campo">
            <label for="duracao">Duração (horas)</label>
            <input id="duracao" name="duracao" type="number" min="0" step="0.5" placeholder="Ex: 2.5" required />
          </div>

          <div class="campo">
            <label for="arquivo">Documento (PDF)</label>
            <input id="arquivo" name="arquivo" type="file" accept="application/pdf" required />
            <div id="nomeArquivo" class="arquivo-info" aria-live="polite"></div>
          </div>
        </div>

        <div class="acoes">
          <button id="btnEnviar" type="submit" class="btn btn-principal">Enviar Solicitação</button>
          <button id="btnLimpar" type="button" class="btn btn-secundario">Limpar</button>
        </div>
      </form>

      <div id="mensagem" role="status" aria-live="polite"></div>
    </section>
  </main>

  <footer class="rodape">
    <p>&copy; 2026 IBMEC. Todos os direitos reservados.</p>
  </footer>

  <script src="../js/externo.js"></script>
</body>
</html>
