<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBMEC — Comprovante de Certificados</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="../css/comprovante.css" />
</head>
  <div class="pagina">
    <div class="cartao">
      <div class="logo">
        <div class="caixa-logo">I</div>
        <span>IBMEC</span>
      </div>

      <h1>Comprovante de envio</h1>
      <p class="subtitulo">Confira o status do envio dos certificados e valide o comprovante.</p>

      <section class="resumo">
        <div class="bloco-status">
          <span class="rotulo">Status atual</span>
          <strong id="statusAtual">Pendente</strong>
          <p class="texto-status">O comprovante ainda não foi validado pelo portal.</p>
        </div>
        <div class="bloco-infos">
          <div>
            <span class="rotulo">Data do envio</span>
            <strong id="dataEnvio">03/05/2026</strong>
          </div>
          <div>
            <span class="rotulo">Tipo de certificado</span>
            <strong id="nomeResponsavel">Certificados AAC</strong>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="comprovante.js"></script>
</body>
</html>
